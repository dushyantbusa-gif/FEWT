<script>
	var a = parseInt(prompt("entre the a"));
    var b = parseInt(prompt("Enter the b"));
	var c = prompt("Entre the logo");
	if(c =='+'){
		console.log(a+b);
	}
	else if(c=='-'){
		console.log(a-b);
	}
	else if(c=='*'){
		console.log(a*b);
	}
	else if(c=='/'){
		console.log(a/b);
	}
	else{
		console.log(a%b);
	}
</script>
